services:
  - type: web
    name: just-call-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: just-call-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://just-call.pages.dev
      - key: FRONTEND_ORIGIN
        value: https://just-call.pages.dev
      - key: SEED_ON_STARTUP
        value: true

databases:
  - name: just-call-db
    plan: free
    databaseName: just_call
