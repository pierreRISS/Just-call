services:
  - type: web
    name: just-call-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: just-call-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://just-call.pages.dev
      - key: FRONTEND_ORIGIN
        value: https://just-call.pages.dev
      - key: SEED_ON_STARTUP
        value: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_TRANSCRIPTION_MODEL
        value: whisper-large-v3

databases:
  - name: just-call-db
    plan: free
    databaseName: just_call
